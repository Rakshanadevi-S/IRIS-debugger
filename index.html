<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRIS AI — Python Visual Debugger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise"></div>

  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="logo-mark">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <circle cx="11" cy="11" r="10" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="11" cy="11" r="4" fill="currentColor"/>
            <line x1="11" y1="1" x2="11" y2="5" stroke="currentColor" stroke-width="1.4"/>
            <line x1="11" y1="17" x2="11" y2="21" stroke="currentColor" stroke-width="1.4"/>
            <line x1="1" y1="11" x2="5" y2="11" stroke="currentColor" stroke-width="1.4"/>
            <line x1="17" y1="11" x2="21" y2="11" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </div>
        <span class="brand-name">IRIS <em>AI</em></span>
      </div>
      <div class="tagline">Python Visual Debugger</div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Understand Python errors<br /><em>instantly.</em></h1>
      <p class="hero-sub">Paste your traceback — get meaning, root causes, a working fix, and a corrected code example.</p>
    </section>

    <section class="input-section">
      <div class="input-label">
        <span>Error traceback</span>
        <div class="examples-row">
          <span class="ex-label">Try:</span>
          <button class="ex-chip" data-key="KeyError">KeyError</button>
          <button class="ex-chip" data-key="TypeError">TypeError</button>
          <button class="ex-chip" data-key="NameError">NameError</button>
          <button class="ex-chip" data-key="IndexError">IndexError</button>
          <button class="ex-chip" data-key="AttributeError">AttributeError</button>
        </div>
      </div>
      <textarea id="errorInput" spellcheck="false" placeholder="Traceback (most recent call last):
  File &quot;app.py&quot;, line 5, in &lt;module&gt;
    print(user['email'])
KeyError: 'email'"></textarea>
      <button class="analyze-btn" id="analyzeBtn">
        <span class="btn-text">Analyze error</span>
        <span class="btn-icon">→</span>
      </button>
    </section>

    <section class="output-section" id="outputSection" style="display:none">
      <div class="output-header">
        <div class="output-title">Analysis</div>
        <div class="response-time" id="responseTime"></div>
      </div>
      <div class="panels" id="panels"></div>
    </section>

    <div class="error-banner" id="errorBanner" style="display:none"></div>
  </main>

  <footer>
    <span>IRIS AI — Python Debugger</span>
    <span>Powered by Claude (Anthropic)</span>
  </footer>

  <script src="utils/examples.js"></script>
  <script src="utils/prompt.js"></script>
  <script src="utils/llm.js"></script>
  <script src="app.js"></script>
</body>
</html>
